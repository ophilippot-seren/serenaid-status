# Auto-renew GH_PAT using GitHub App serenaid-ops
# The installation token expires after 1h, so we renew every 50 min.
# The App private key never expires — no more PAT expiration issues.
name: Renew GH_PAT

on:
  schedule:
    - cron: "*/50 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  renew:
    name: Renew GH_PAT from GitHub App
    runs-on: ubuntu-latest
    steps:
      - name: Generate token from GitHub App
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: serenaid-status

      - name: Store as GH_PAT secret
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh secret set GH_PAT --repo "${{ github.repository }}" --body "$GH_TOKEN"
          echo "GH_PAT renewed at $(date -u)"
